version: '3.8'

services:
  stat:
    build: ./stat
    ports:
      - "8002:8002"
    environment:
      - SQLITE_PATH=/app/data/listenai.db
    volumes:
      - listenai-db-data:/app/data
    networks:
      - listenai-network

  nlp:
    build: ./nlp
    ports:
      - "8001:8001"
    networks:
      - listenai-network

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - stat
      - nlp
    environment:
      - STAT_URL=http://stat:8002
      - NLP_URL=http://nlp:8001
    volumes:
      - listenai-db-data:/app/data
    networks:
      - listenai-network

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - gateway
    environment:
      - GATEWAY_URL=http://gateway:8000
    networks:
      - listenai-network

networks:
  listenai-network:
    driver: bridge

# 宣告具名的 Volume
volumes:
  listenai-db-data: